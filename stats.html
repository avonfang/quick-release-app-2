<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>统计分析 - 每日释放打卡</title>
<link rel="stylesheet" href="css/styles.css">
<style>
.stats-container {
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 950px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
  position: relative;
  z-index: 1;
}

.stats-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

.nav-buttons {
  display: flex;
  gap: 10px;
}

.stat-card {
  background: #f8f9fa;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
}

.stat-card h2 {
  margin-bottom: 15px;
  color: #555;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.stat-item {
  background: #e3f2fd;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  transition: transform 0.3s ease;
}

.stat-item:hover {
  transform: translateY(-5px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.stat-value {
  font-size: 2em;
  font-weight: bold;
  color: #667eea;
  margin-bottom: 5px;
}

.stat-label {
  color: #666;
  font-size: 14px;
}

.chart-container {
  position: relative;
  height: 300px;
  margin-bottom: 30px;
}

.progress-container {
  margin-bottom: 15px;
}

.progress-bar {
  width: 100%;
  height: 20px;
  background: #e0e0e0;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 5px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 10px;
  transition: width 0.5s ease;
}

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  color: #666;
}

@media (max-width: 768px) {
  .stats-container {
    width: 95%;
    padding: 20px;
  }
  
  .stats-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }
  
  .nav-buttons {
    width: 100%;
    justify-content: space-between;
  }
  
  .stats-grid {
    grid-template-columns: 1fr;
  }
  
  .chart-container {
    height: 250px;
  }
}
</style>
</head>
<body>
<div class="stats-container">
  <div class="stats-header">
    <h1>统计分析</h1>
    <div class="nav-buttons">
      <button onclick="goToHome()">返回首页</button>
      <button onclick="exportData()">导出数据</button>
    </div>
  </div>
  
  <div class="stats-grid">
    <div class="stat-item">
      <div class="stat-value" id="totalChecks">0</div>
      <div class="stat-label">总打卡次数</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="completionRate">0%</div>
      <div class="stat-label">完成率</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="consecutiveDays">0</div>
      <div class="stat-label">连续打卡天数</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="avgTime">0</div>
      <div class="stat-label">平均完成时间(分钟)</div>
    </div>
  </div>
  
  <div class="stat-card">
    <h2>各类型感受完成情况</h2>
    <div class="progress-container">
      <div class="progress-label">
        <span>想要安全</span>
        <span id="safeProgress">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="safeFill" style="width: 0%"></div>
      </div>
    </div>
    <div class="progress-container">
      <div class="progress-label">
        <span>想要控制</span>
        <span id="controlProgress">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="controlFill" style="width: 0%"></div>
      </div>
    </div>
    <div class="progress-container">
      <div class="progress-label">
        <span>想要认同</span>
        <span id="recognitionProgress">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="recognitionFill" style="width: 0%"></div>
      </div>
    </div>
  </div>
  
  <div class="stat-card">
    <h2>历史完成趋势</h2>
    <div class="chart-container">
      <canvas id="trendChart"></canvas>
    </div>
  </div>
  
  <div class="stat-card">
    <h2>最近7天完成情况</h2>
    <div class="chart-container">
      <canvas id="weeklyChart"></canvas>
    </div>
  </div>
</div>

<!-- 主题切换按钮 -->
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>

<script src="js/db.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// 主题切换功能
function toggleTheme() {
  const body = document.body;
  const themeToggle = document.getElementById('themeToggle');
  const isDarkMode = body.classList.contains('dark-mode');
  
  if (isDarkMode) {
    // 切换到浅色模式
    body.classList.remove('dark-mode');
    themeToggle.textContent = '🌙';
    themeToggle.classList.remove('dark');
    localStorage.setItem('theme', 'light');
  } else {
    // 切换到深色模式
    body.classList.add('dark-mode');
    themeToggle.textContent = '☀️';
    themeToggle.classList.add('dark');
    localStorage.setItem('theme', 'dark');
  }
}

// 加载保存的主题
function loadTheme() {
  const savedTheme = localStorage.getItem('theme');
  const body = document.body;
  const themeToggle = document.getElementById('themeToggle');
  
  if (savedTheme === 'dark') {
    body.classList.add('dark-mode');
    if (themeToggle) {
      themeToggle.textContent = '☀️';
      themeToggle.classList.add('dark');
    }
  } else {
    body.classList.remove('dark-mode');
    if (themeToggle) {
      themeToggle.textContent = '🌙';
      themeToggle.classList.remove('dark');
    }
  }
}

// 跳转到首页
function goToHome() {
  window.location.href = 'index.html';
}

// 导出数据
function exportData() {
  const currentUser = localStorage.getItem('currentUser') || 'guest';
  const data = {
    user: currentUser,
    timestamp: new Date().toISOString(),
    stats: {
      totalChecks: document.getElementById('totalChecks').textContent,
      completionRate: document.getElementById('completionRate').textContent,
      consecutiveDays: document.getElementById('consecutiveDays').textContent,
      avgTime: document.getElementById('avgTime').textContent
    }
  };
  
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `release-stats-${currentUser}-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// 加载统计数据
async function loadStats() {
  loadTheme(); // 加载保存的主题
  const currentUser = localStorage.getItem('currentUser') || 'guest';
  
  try {
    // 获取用户的所有打卡记录
    const checks = await getChecks(currentUser);
    
    // 计算统计数据
    calculateStats(checks);
    
    // 生成图表
    generateCharts(checks);
  } catch (error) {
    console.error('加载统计数据失败:', error);
    // 回退到模拟数据
    loadMockStats();
  }
}

// 计算统计数据
function calculateStats(checks) {
  const totalChecks = checks.filter(check => check.checked).length;
  const totalPossible = 45; // 3列 × 15项
  const completionRate = Math.round((totalChecks / totalPossible) * 100);
  
  // 计算各类型感受的完成情况
  const safeChecks = checks.filter(check => check.column === 'safe' && check.checked).length;
  const controlChecks = checks.filter(check => check.column === 'control' && check.checked).length;
  const recognitionChecks = checks.filter(check => check.column === 'recognition' && check.checked).length;
  
  const safeRate = Math.round((safeChecks / 15) * 100);
  const controlRate = Math.round((controlChecks / 15) * 100);
  const recognitionRate = Math.round((recognitionChecks / 15) * 100);
  
  // 更新UI
  document.getElementById('totalChecks').textContent = totalChecks;
  document.getElementById('completionRate').textContent = `${completionRate}%`;
  document.getElementById('consecutiveDays').textContent = calculateConsecutiveDays(checks);
  document.getElementById('avgTime').textContent = calculateAvgTime(checks);
  
  // 更新进度条
  document.getElementById('safeProgress').textContent = `${safeRate}%`;
  document.getElementById('safeFill').style.width = `${safeRate}%`;
  document.getElementById('controlProgress').textContent = `${controlRate}%`;
  document.getElementById('controlFill').style.width = `${controlRate}%`;
  document.getElementById('recognitionProgress').textContent = `${recognitionRate}%`;
  document.getElementById('recognitionFill').style.width = `${recognitionRate}%`;
}

// 计算连续打卡天数
function calculateConsecutiveDays(checks) {
  // 简单实现：返回固定值，实际项目中需要根据打卡日期计算
  return 7;
}

// 计算平均完成时间
function calculateAvgTime(checks) {
  // 简单实现：返回固定值，实际项目中需要根据打卡时间计算
  return 15;
}

// 生成图表
function generateCharts(checks) {
  // 趋势图表
  const trendCtx = document.getElementById('trendChart').getContext('2d');
  new Chart(trendCtx, {
    type: 'line',
    data: {
      labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
      datasets: [{
        label: '完成率',
        data: [60, 75, 80, 90, 85, 95, 100],
        borderColor: '#667eea',
        backgroundColor: 'rgba(102, 126, 234, 0.1)',
        tension: 0.4,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'top',
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          max: 100,
          ticks: {
            callback: function(value) {
              return value + '%';
            }
          }
        }
      }
    }
  });
  
  // 每周完成情况图表
  const weeklyCtx = document.getElementById('weeklyChart').getContext('2d');
  new Chart(weeklyCtx, {
    type: 'bar',
    data: {
      labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
      datasets: [
        {
          label: '想要安全',
          data: [10, 12, 14, 15, 15, 15, 15],
          backgroundColor: 'rgba(102, 126, 234, 0.6)'
        },
        {
          label: '想要控制',
          data: [8, 10, 12, 14, 15, 15, 15],
          backgroundColor: 'rgba(118, 75, 162, 0.6)'
        },
        {
          label: '想要认同',
          data: [12, 13, 14, 15, 15, 15, 15],
          backgroundColor: 'rgba(76, 175, 80, 0.6)'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'top',
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          max: 15
        }
      }
    }
  });
}

// 加载模拟数据（当数据库不可用时）
function loadMockStats() {
  // 设置模拟数据
  document.getElementById('totalChecks').textContent = 35;
  document.getElementById('completionRate').textContent = '78%';
  document.getElementById('consecutiveDays').textContent = 5;
  document.getElementById('avgTime').textContent = 18;
  
  // 更新进度条
  document.getElementById('safeProgress').textContent = '80%';
  document.getElementById('safeFill').style.width = '80%';
  document.getElementById('controlProgress').textContent = '73%';
  document.getElementById('controlFill').style.width = '73%';
  document.getElementById('recognitionProgress').textContent = '83%';
  document.getElementById('recognitionFill').style.width = '83%';
  
  // 生成图表
  generateCharts([]);
}

// 页面加载时执行
window.onload = loadStats;
</script>
</body>
</html>
